volumes:
  postgres-data:
  kestra-data:

services:
  postgres:
    image: postgres:16
    container_name: kestra-postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: k3str4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d kestra -U kestra"]
      interval: 10s
      timeout: 5s
      retries: 10

  kestra:
    image: kestra/kestra:latest
    container_name: kestra
    pull_policy: always
    user: "root"
    command: server standalone
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - kestra-data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - ./flows:/app/flows
      - ./scripts:/app/scripts
      - ./sql:/app/sql
      - /tmp/kestra-wd:/tmp/kestra-wd
    environment:
      KESTRA_CONFIGURATION: |
        micronaut:
          io:
            watch:
              enabled: true
              paths:
                - /app/flows

        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: k3str4

        kestra:
          repository:
            type: postgres

          storage:
            type: local
            local:
              base-path: "/app/storage"

          queue:
            type: postgres
          
          local-files:
            allowed-paths:
              - /app/sql

          tasks:
            tmp-dir:
              path: /tmp/kestra-wd/tmp

          plugins:
            configurations:
              - type: io.kestra.plugin.scripts.runner.docker.Docker
                values:
                  # volumeEnabled: true
                  volume-enabled: true
          url: http://localhost:8080/
    depends_on:
      postgres:
        condition: service_healthy

  bottleneck-python:
    build:
      context: .
      dockerfile: Dockerfile
    image: bottleneck-python:latest
    container_name: bottleneck-python-builder
    command: ["python", "-c", "print('bottleneck-python image is ready')"]